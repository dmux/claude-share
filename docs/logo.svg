<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64" role="img" aria-label="claude-share logo">
  <!-- Terminal shell prompt (>_) app-icon, in the spirit of the Rio terminal,
       over the brand gradient. -->
  <defs>
    <linearGradient id="csg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#818cf8"/>
      <stop offset="48%" stop-color="#c084fc"/>
      <stop offset="100%" stop-color="#22d3ee"/>
    </linearGradient>
  </defs>
  <rect x="1" y="1" width="62" height="62" rx="15" fill="url(#csg)"/>
  <!-- soft depth: darker prompt shadow behind -->
  <g transform="translate(1,1.5)" fill="none" stroke="#0a0a12" stroke-width="6"
     stroke-linecap="round" stroke-linejoin="round" opacity="0.18">
    <path d="M21 22 L32 32 L21 42"/>
    <path d="M36 42 H46"/>
  </g>
  <!-- prompt chevron + cursor underscore -->
  <g fill="none" stroke="#ffffff" stroke-width="6" stroke-linecap="round" stroke-linejoin="round">
    <path d="M21 22 L32 32 L21 42"/>
    <path d="M36 42 H46"/>
  </g>
</svg>
